<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAX VERSTAPPEN • 33 • 1</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Orbitron:wght@600;700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --red: #c8102e;
      --dark: #0a0a0a;
      --gray: #1a1a1a;
      --light: #f0f0f0;
      --speed: 0.8s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      color: var(--light);
      font-family: 'Roboto Condensed', sans-serif;
      overflow-x: hidden;
      line-height: 1.1;
    }

    /* BACKGROUND MOVIMENTO */
    .bg-motion {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 80%, var(--red) 0%, transparent 60%),
        linear-gradient(to bottom, #000 0%, #111 100%);
      z-index: -2;
      pointer-events: none;
    }

    .bg-lines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(200,16,46,0.03) 40px,
        rgba(200,16,46,0.03) 80px
      );
      animation: drift 60s linear infinite;
      z-index: -1;
      opacity: 0.4;
    }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(-1600px); }
    }

    /* HERO */
    header.hero {
      height: 100vh;
      min-height: 880px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5vw;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1617634667039-8e4ee0b3b8f5?auto=format&fit=crop&q=90&w=2400') center/cover no-repeat;
      filter: brightness(0.35) contrast(1.25);
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      width: 100%;
    }

    .number-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 0.75;
      margin-bottom: 2vh;
    }

    .number-1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(18rem, 28vw, 48rem);
      font-weight: 900;
      color: var(--red);
      text-shadow: 
        0 0 80px rgba(200,16,46,0.7),
        0 0 160px rgba(200,16,46,0.4),
        0 0 240px rgba(200,16,46,0.2);
      letter-spacing: -0.06em;
      animation: pulse 6s infinite alternate;
    }

    .number-33 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(6rem, 12vw, 14rem);
      color: rgba(240,240,240,0.15);
      -webkit-text-stroke: 2px var(--red);
      text-shadow: 0 0 60px rgba(200,16,46,0.5);
      letter-spacing: -0.03em;
      margin-top: -8vh;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.92; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.03); }
    }

    h1.name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(5rem, 11vw, 14rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(90deg, #fff 20%, var(--red) 50%, #fff 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 60px rgba(200,16,46,0.6);
      margin: 4vh 0 1vh;
      animation: glow 4s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 40px rgba(200,16,46,0.4); }
      to   { text-shadow: 0 0 100px rgba(200,16,46,0.9), 0 0 160px rgba(200,16,46,0.5); }
    }

    .tagline {
      font-size: clamp(1.8rem, 4.5vw, 3.6rem);
      color: var(--red);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin: 3vh 0 6vh;
      font-weight: 700;
    }

    .flags {
      display: flex;
      justify-content: center;
      gap: 4vw;
      margin: 5vh 0 8vh;
      flex-wrap: wrap;
    }

    .flag {
      width: 180px;
      height: 110px;
      background-size: cover;
      border: 4px solid var(--red);
      box-shadow: 0 0 50px rgba(200,16,46,0.5);
      border-radius: 8px;
      transition: all 0.5s ease;
      transform: perspective(800px) rotateX(8deg);
    }

    .flag:hover {
      transform: perspective(800px) rotateX(0deg) scale(1.15);
      box-shadow: 0 0 100px rgba(200,16,46,0.9);
      filter: brightness(1.2);
    }

    .cta-group {
      display: flex;
      justify-content: center;
      gap: 3vw;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1.2rem 3.8rem;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: white;
      background: transparent;
      border: 3px solid var(--red);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s;
    }

    .btn:hover {
      color: white;
      background: var(--red);
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(200,16,46,0.7);
    }

    .btn::after {
      content: "";
      position: absolute;
      top: -50%; left: -100%;
      width: 60%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      transition: left 0.7s;
    }

    .btn:hover::after {
      left: 150%;
    }

    /* FOOTER */
    footer {
      padding: 5rem 5vw;
      text-align: center;
      color: #555;
      font-size: 1.1rem;
      border-top: 1px solid #222;
      background: linear-gradient(to top, #000, transparent);
    }

    @media (max-width: 768px) {
      .number-33 { margin-top: -5vh; font-size: clamp(4rem, 10vw, 10rem); }
      .number-1   { font-size: clamp(12rem, 22vw, 32rem); }
      h1.name     { font-size: clamp(4rem, 10vw, 10rem); }
      .tagline    { font-size: clamp(1.4rem, 4vw, 2.4rem); }
      .btn        { padding: 1rem 2.5rem; font-size: 1.4rem; }
      .flags      { gap: 6vw; }
      .flag       { width: 140px; height: 85px; }
    }
  </style>
</head>
<body>

  <div class="bg-motion"></div>
  <div class="bg-lines"></div>

  <header class="hero">
    <div class="content">
      <div class="number-stack">
        <div class="number-1">1</div>
        <div class="number-33">33</div>
      </div>

      <h1 class="name">VERSTAPPEN</h1>
      <div class="tagline">Triple World Champion</div>

      <div class="flags">
        <div class="flag" style="background-image: url('https://flagcdn.com/w320/nl.png')"></div>
        <div class="flag" style="background-image: url('https://flagcdn.com/w320/be.png')"></div>
      </div>

      <div class="cta-group">
        <button class="btn">WATCH 2026 SEASON</button>
        <button class="btn">RED BULL RACING</button>
      </div>
    </div>
  </header>

  <footer>
    <p>Max Verstappen • Unofficial Fan Experience • 2026</p>
  </footer>

</body>
</html>
